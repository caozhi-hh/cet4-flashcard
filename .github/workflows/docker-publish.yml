name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Log in to Tencent Cloud TCR
        run: docker login ccr.ccs.tencentyun.com -u "${{ secrets.TENCENT_USERNAME }}" -p "${{ secrets.TENCENT_PASSWORD }}"

      - name: Build and push image
        env:
          GHCR_IMAGE: ghcr.io/caozhi-hh/cet4-flashcard
          TX_IMAGE: ccr.ccs.tencentyun.com/${{ secrets.TENCENT_NAMESPACE }}/cet4-flashcard
          TAG: r${{ github.run_number }}
        run: |
          # 一次构建，同时打 ghcr + 腾讯云 的 latest + 版本号 tag
          docker build \
            -t $GHCR_IMAGE:latest -t $GHCR_IMAGE:$TAG \
            -t $TX_IMAGE:latest -t $TX_IMAGE:$TAG \
            .
          docker push --all-tags $GHCR_IMAGE
          docker push --all-tags $TX_IMAGE

      - name: Set GHCR image to public
        run: |
          curl -sS -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user/packages/container/cet4-flashcard \
            -d '{"visibility":"public"}' || true
