name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 支持手动触发

env:
  IMAGE: ghcr.io/caozhi-hh/cet4-flashcard

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          # 同时打 latest + 版本号(用run编号,便于Sealos强制拉取新tag)
          docker build -t $IMAGE:latest -t $IMAGE:r${{ github.run_number }} .
          docker push --all-tags $IMAGE

      - name: Set image to public
        run: |
          curl -sS -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user/packages/container/cet4-flashcard \
            -d '{"visibility":"public"}' || true
